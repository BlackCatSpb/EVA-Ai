[pytest]
markers =
    timeout: mark tests with timeout in seconds

# Включаем обязательное логгирование в консоль во время выполнения тестов
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_cli_date_format = %H:%M:%S

# Фильтрация нерелевантных предупреждений (spaCy/Click DeprecationWarning)
filterwarnings =
    ignore:Importing 'parser\.split_arg_string' is deprecated:DeprecationWarning

# Пишем логи в файл для последующего анализа
log_file = pytest.log
log_file_level = INFO
log_file_format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ограничиваем коллекцию тестов директорией tests/ и явным паттерном имён
testpaths = tests
python_files = test_*.py

# Исключаем скрипты из рекурсии, чтобы не ловить одноимённые test_* файлы в scripts/
norecursedirs = scripts
