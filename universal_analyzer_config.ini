[main]
project_root = .
exclude_dirs = venv,.venv,env,.env,.git,__pycache__,node_modules,dist,build,.pytest_cache,memory_storage,models,project_analyzer,analysis_logs,nest-simulator-3.7,.cogniflex_models,cogniflex_cache,cogniflex_analysis,cogniflex_cache_db,cogniflex_ethics_cache,cogniflex_graph_cache,cogniflex_gui_cache,cogniflex_memory_cache,cogniflex_neuromorphic_cache,cogniflex_web_cache,ethics_cache,logs,nltk_data,async_text_cache,test_cache,test_unified_cache,text_cache
include_extensions = .py

[rules]
check_undefined_variables = true
check_unused_imports = true
check_circular_imports = false
check_code_smells = true
check_architecture = true

[architecture]
core_files = core_brain.py
forbidden_direct_core_access = true

[output]
format = console
save_to_file = true
log_directory = analysis_logs

[performance]
max_file_size_mb = 10
parallel_analysis = false